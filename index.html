<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

#loading {
  font-size: 30px;
}

#scare {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 9999;
}

#flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  z-index: 9998;
}

@keyframes shake {
  0% { transform: translate(5px,5px); }
  25% { transform: translate(-5px,5px); }
  50% { transform: translate(5px,-5px); }
  75% { transform: translate(-5px,-5px); }
  100% { transform: translate(0,0); }
}
</style>
</head>
<body>

<div id="loading">Tap to start...</div>
<div id="flash"></div>

<!-- GANTI FILE LU -->
<img id="scare" src="scare.jpg">

<audio id="s1" src="sound1.mp3"></audio>
<audio id="s2" src="sound2.mp3"></audio>
<audio id="s3" src="sound3.mp3"></audio>

<script>
let text = document.getElementById("loading");
let scare = document.getElementById("scare");
let flash = document.getElementById("flash");

let s1 = document.getElementById("s1");
let s2 = document.getElementById("s2");
let s3 = document.getElementById("s3");

let i = 0;

document.body.addEventListener("click", start);

function start(){
  document.body.removeEventListener("click", start);

  // fullscreen
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  let interval = setInterval(() => {
    i += Math.floor(Math.random() * 20) + 5;
    if(i > 100) i = 100;

    text.innerText = "Loading... " + i + "%";

    if (i >= 100) {
      clearInterval(interval);

      setTimeout(() => {

        // flash putih
        flash.style.opacity = "1";
        setTimeout(() => flash.style.opacity = "0", 100);

        // tampil gambar
        text.style.display = "none";
        scare.style.display = "block";

        // SOUND 1 (JEDAR utama)
        s1.volume = 1.0;
        s1.play();

        // SOUND 2 (delay dikit)
        setTimeout(() => {
          s2.volume = 0.7;
          s2.play();
        }, 150);

        // SOUND 3 (background ganggu)
        setTimeout(() => {
          s3.volume = 0.5;
          s3.loop = true;
          s3.play();
        }, 300);

        // shake layar
        document.body.style.animation = "shake 0.1s infinite";

      }, 300);
    }

  }, 200);
}
</script>

</body>
</html>
